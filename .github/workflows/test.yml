name: Trigger & Wait for CircleCI

on:
  push:
    branches:
      - develop
      - staging
      - prod

jobs:
  trigger-circleci:
    name: Trigger CircleCI Pipeline
    if: contains(github.event.head_commit.message, 'Merge')
    runs-on: ubuntu-latest
    outputs:
      pipeline_id: ${{ steps.trigger.outputs.pipeline_id }}
      pipeline_number: ${{ steps.trigger.outputs.pipeline_number }}

    steps:
      - name: Trigger CircleCI pipeline
        id: trigger
        run: |
          RESPONSE=$(curl -s -X POST "https://circleci.com/api/v2/project/github/netomedia/ng-game/pipeline" \
            -H "Circle-Token: ${CIRCLECI_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
                  "branch": "'"$GITHUB_REF_NAME"'"
                }')

          echo "Response: $RESPONSE"

          PIPELINE_ID=$(echo $RESPONSE | jq -r '.id')
          PIPELINE_NUMBER=$(echo $RESPONSE | jq -r '.number')
          echo "pipeline_id=$PIPELINE_ID" >> $GITHUB_OUTPUT
          echo "pipeline_number=$PIPELINE_NUMBER" >> $GITHUB_OUTPUT
        env:
          CIRCLECI_TOKEN: ${{ secrets.CIRCLECI_TOKEN }}

      - name: Wait for workflow to finish
        run: |
          PIPELINE_ID=${{ steps.trigger.outputs.pipeline_id }}

          echo "Waiting for workflow for pipeline: $PIPELINE_ID"

          while true; do
            WORKFLOW_RESPONSE=$(curl -s -H "Circle-Token: ${CIRCLECI_TOKEN}" \
              "https://circleci.com/api/v2/pipeline/$PIPELINE_ID/workflow")

            WORKFLOW_ID=$(echo $WORKFLOW_RESPONSE | jq -r '.items[0].id')

            if [ "$WORKFLOW_ID" != "null" ]; then
              break
            fi

            echo "Waiting for workflow to start..."
            sleep 5
          done

          echo "Workflow ID: $WORKFLOW_ID"

          while true; do
            STATUS_RESPONSE=$(curl -s -H "Circle-Token: ${CIRCLECI_TOKEN}" \
              "https://circleci.com/api/v2/workflow/$WORKFLOW_ID")

            STATUS=$(echo $STATUS_RESPONSE | jq -r '.status')

            echo "Current status: $STATUS"

            if [ "$STATUS" == "success" ]; then
              echo "CircleCI build passed ✅"
              exit 0
            elif [ "$STATUS" == "failed" ] || [ "$STATUS" == "canceled" ]; then
              echo "CircleCI build failed ❌"
              exit 1
            fi

            sleep 30
          done
        env:
          CIRCLECI_TOKEN: ${{ secrets.CIRCLECI_TOKEN }}

  trigger-jenkins:
    name: Trigger Jenkins Job
    runs-on: ubuntu-latest
    needs: trigger-circleci
    if: github.ref_name == 'develop' || github.ref_name == 'staging'
    steps:
      - name: Trigger Jenkins job
        env:
          JENKINS_URL: https://jenkins.anakatech.com
          JENKINS_JOB_PATH: /view/Tests/job/Tests/job/poc-loop
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
        run: |
          CRUMB_DATA=$(curl --fail-with-body -s -u "${JENKINS_USER}:${JENKINS_API_TOKEN}" "${JENKINS_URL}/crumbIssuer/api/json")
          
          if ! echo "$CRUMB_DATA" | jq . > /dev/null 2>&1; then
            echo "::error::Failed to fetch a valid crumb from Jenkins. The response was not valid JSON."
            echo "Jenkins response:"
            echo "$CRUMB_DATA"
            exit 1
          fi
          
          CRUMB=$(echo "$CRUMB_DATA" | jq -r '.crumb')
          CRUMB_HEADER_NAME=$(echo "$CRUMB_DATA" | jq -r '.crumbRequestField')
          COMBINED_NAME="${GITHUB_REF_NAME}-${{needs.trigger-circleci.outputs.pipeline_number}}"

          echo "Triggering Jenkins job with ${COMBINED_NAME} as IMAGE_TAG parameter..."
          curl -X POST -u "${JENKINS_USER}:${JENKINS_API_TOKEN}" -H "${CRUMB_HEADER_NAME}:${CRUMB}" "${JENKINS_URL}${JENKINS_JOB_PATH}/buildWithParameters?IMAGE_TAG=${COMBINED_NAME}"